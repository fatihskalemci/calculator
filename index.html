<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feseka's Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <p id="top"></p>
            <p id="bottom"></p>
        </div>
        <div class="row row-one">
            <button class="operator" id="clear">AC</button>
            <button class="operator" id="backspace">DEL</button>
            <button class="operator operation" id="percent" value="%">%</button>
            <button class="operator operation" id="divide" value="/">/</button>
        </div>
        <div class="row row-two">
            <button class="operand" id="seven" value="7">7</button>
            <button class="operand" id="eight" value="8">8</button>
            <button class="operand" id="nine" value="9">9</button>
            <button class="operator operation" id="multiply" value="*">X</button>
        </div>
        <div class="row row-tree">
            <button class="operand" id="four" value="4">4</button>
            <button class="operand" id="five" value="5">5</button>
            <button class="operand" id="six" value="6">6</button>
            <button class="operator operation" id="minus" value="-">-</button>
        </div>
        <div class="row row-four">
            <button class="operand" id="one" value="1">1</button>
            <button class="operand" id="two" value="2">2</button>
            <button class="operand" id="three" value="3">3</button>
            <button class="operator operation" id="plus" value="+">+</button>
        </div>
        <div class="row row-five">
            <button class="operand" id="zero" value="0">0</button>
            <button class="operand" id="point" value=".">.</button>
            <button class="operator" id="equal">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
