<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feseka's Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <p id="top">1967</p>
            <p id="bottom">31+61</p>
        </div>
        <div class="row row-one">
            <button class="operator" id="clear">AC</button>
            <button class="operator" id="backspace">DEL</button>
            <button class="operator" id="percent">%</button>
            <button class="operator" id="divide">/</button>
        </div>
        <div class="row row-two">
            <button class="operand" id="seven">7</button>
            <button class="operand" id="eight">8</button>
            <button class="operand" id="nine">9</button>
            <button class="operator" id="multiply">X</button>
        </div>
        <div class="row row-tree">
            <button class="operand" id="four">4</button>
            <button class="operand" id="five">5</button>
            <button class="operand" id="six">6</button>
            <button class="operator" id="minus">-</button>
        </div>
        <div class="row row-four">
            <button class="operand" id="one">1</button>
            <button class="operand" id="tow">2</button>
            <button class="operand" id="three">3</button>
            <button class="operator" id="plus">+</button>
        </div>
        <div class="row row-five">
            <button class="operand" id="zero">0</button>
            <button class="operand" id="point">,</button>
            <button class="operator" id="equal">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
